name: validation

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.4"
  ELIXIR_UTILS_REF: "a5b25614055eb71b48f619f2d405ea7d763b8a10"
  DESIGN_SYSTEM_REF: "eb1c67265c3f0f831373c06f292a7badfb50a5e7"
  AUTOLAUNCH_REF: "876207e76301ca4a8da96a7b8563e77357718b59"
  PLATFORM_REF: "9cf5a21b1f0ccb9a0f610aa07f9ed3efca0de8cf"
  REGENTS_CLI_REF: "f7d3cbe1d426427762db9739010bc0c67e158052"
  SIWA_SERVER_REF: "3b8c6c2cdefc0094d73910d5f5ce9ca7e7da02b2"

jobs:
  phoenix:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech_tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCAL_DATABASE_URL: ecto://postgres:postgres@localhost/tech_tree_test

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/elixir-utils
          ref: ${{ env.ELIXIR_UTILS_REF }}
          path: elixir-utils
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/design-system
          ref: ${{ env.DESIGN_SYSTEM_REF }}
          path: design-system
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install Phoenix deps
        working-directory: techtree
        run: mix deps.get

      - name: Run Phoenix validation
        working-directory: techtree
        run: |
          mix precommit
          git diff --exit-code

  browser:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech_tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCAL_DATABASE_URL: ecto://postgres:postgres@localhost/tech_tree_test
      PLAYWRIGHT_VERSION: 1.58.2

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/elixir-utils
          ref: ${{ env.ELIXIR_UTILS_REF }}
          path: elixir-utils
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/design-system
          ref: ${{ env.DESIGN_SYSTEM_REF }}
          path: design-system
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phoenix deps
        working-directory: techtree
        run: mix deps.get

      - name: Install asset deps
        working-directory: techtree/assets
        run: npm ci

      - name: Install browser CLI
        run: npm install -g agent-browser

      - name: Prepare app
        working-directory: techtree
        run: |
          mix ecto.setup
          mix assets.setup
          mix assets.build

      - name: Start Phoenix server
        working-directory: techtree
        run: |
          mix phx.server > /tmp/tech_tree_browser.log 2>&1 &
          echo $! > /tmp/tech_tree_browser.pid

      - name: Run homepage browser lanes
        working-directory: techtree
        run: |
          bash qa/phase-c-smoke.sh
          bash qa/phase-d-browser-e2e.sh

      - name: Stop Phoenix server
        if: always()
        run: |
          if [ -f /tmp/tech_tree_browser.pid ]; then
            kill "$(cat /tmp/tech_tree_browser.pid)" || true
          fi

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts
          path: |
            techtree/qa/artifacts
            /tmp/tech_tree_browser.log

  regents-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/regents-cli
          ref: ${{ env.REGENTS_CLI_REF }}
          path: regents-cli
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/platform
          ref: ${{ env.PLATFORM_REF }}
          path: platform
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/autolaunch
          ref: ${{ env.AUTOLAUNCH_REF }}
          path: autolaunch
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/siwa-server
          ref: ${{ env.SIWA_SERVER_REF }}
          path: siwa-server
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.0"

      - name: Install regents-cli deps
        working-directory: regents-cli
        run: pnpm install --frozen-lockfile

      - name: Run cross-repo contract validation
        working-directory: regents-cli
        run: |
          pnpm check:openapi
          pnpm check:cli-contract

      - name: Run regents-cli validation and packaged install smoke
        working-directory: regents-cli
        run: |
          pnpm build
          pnpm typecheck
          pnpm test
          pnpm test:pack-smoke

  contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        working-directory: techtree/contracts
        run: forge test --offline

  release-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/elixir-utils
          ref: ${{ env.ELIXIR_UTILS_REF }}
          path: elixir-utils
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/design-system
          ref: ${{ env.DESIGN_SYSTEM_REF }}
          path: design-system
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}

      - name: Stage sibling packages for Phoenix image
        run: |
          mkdir -p techtree/.fly-build
          cp -a elixir-utils techtree/.fly-build/elixir-utils
          cp -a design-system techtree/.fly-build/design-system

      - name: Build release image from assembled workspace
        run: docker build -f techtree/Dockerfile techtree
