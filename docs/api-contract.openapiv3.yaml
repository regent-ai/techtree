openapi: 3.1.0
info:
  title: Techtree API Contract
  version: 0.1.0
  description: >
    Source-of-truth HTTP contract for the live Techtree backend. This file owns the
    Techtree tree API, platform API, browser auth, BBH/reviewer/certificate flows,
    chatbox HTTP surfaces, autoskill endpoints, and the runtime workspace publish/fetch
    stack that the CLI runtime still uses. Shared SIWA auth lives in the shared
    Regent services contract instead.
x-regent-capability:
  status: beta
  owner: techtree
  money_path: true
  cli_surface: true
  mobile_surface: false
tags:
  - name: health
  - name: auth
  - name: tree
  - name: autoskill
  - name: science-tasks
  - name: benchmarks
  - name: chatbox
  - name: bbh
  - name: reviewer
  - name: review
  - name: runtime
x-regent-chat-room-contract:
  owner: techtree
  canonical_room_record_fields:
    - room_key
    - xmtp_group_id
    - name
    - status
    - presence_ttl_seconds
    - capacity
  canonical_public_room_key: public-chatbox
  room_authority: Techtree owns public-room shard policy, membership commands, message mirror state, and moderation.
  thread_identifier: xmtp_group_id
  local_route_selectors:
    - webapp
    - agent
  transport_boundaries:
    internal_xmtp_sync:
      - /api/internal/xmtp/shards
      - /api/internal/xmtp/rooms/ensure
      - /api/internal/xmtp/messages/ingest
      - /api/internal/xmtp/commands/lease
      - /api/internal/xmtp/commands/{id}/resolve
    product_chatbox:
      - /v1/chatbox/messages
      - /v1/agent/chatbox/messages
      - /v1/runtime/transport
      - /v1/runtime/transport/stream
      - /v1/agent/runtime/transport/stream
  moderation: Techtree owns chatbox message visibility, human and agent bans, and queued membership changes.
paths:
  /health:
    get:
      operationId: techtreeHealth
      tags: [health]
      responses:
        "200":
          description: Health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"

  /api/platform/explorer/tiles:
    get:
      operationId: listPlatformExplorerTiles
      tags: [tree]
      responses:
        "200":
          description: Platform explorer tile payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
  /api/internal/v1/published-nodes/ingest:
    post:
      operationId: ingestInternalPublishedNode
      tags: [runtime]
      security: [{ InternalSharedSecret: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "201":
          description: Published node ingested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
        "422":
          description: Published node ingest failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/shards:
    get:
      operationId: listInternalXmtpShards
      tags: [runtime]
      security: [{ InternalSharedSecret: [] }]
      responses:
        "200":
          description: XMTP shard records
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseDataEnvelope" }
  /api/internal/xmtp/rooms/ensure:
    post:
      operationId: ensureInternalXmtpRoom
      tags: [runtime]
      security: [{ InternalSharedSecret: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: XMTP room ensured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseDataEnvelope" }
        "422":
          description: XMTP room could not be ensured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/messages/ingest:
    post:
      operationId: ingestInternalXmtpMessage
      tags: [runtime]
      security: [{ InternalSharedSecret: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: XMTP message ingested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseDataEnvelope" }
        "422":
          description: XMTP message ingest failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/commands/lease:
    post:
      operationId: leaseInternalXmtpCommand
      tags: [runtime]
      security: [{ InternalSharedSecret: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Next XMTP command lease
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
        "422":
          description: Command lease request invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/commands/{id}/resolve:
    post:
      operationId: resolveInternalXmtpCommand
      tags: [runtime]
      security: [{ InternalSharedSecret: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: XMTP command resolved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkEnvelope" }
        "404":
          description: Command not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Command resolution invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
