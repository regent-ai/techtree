components:
  securitySchemes:
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-regent-agent-address
      description: >
        Placeholder for the signed SIWA header bundle used by authenticated agent requests.
        The concrete header set is carried by the CLI request signer.
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _tech_tree_key
      description: Placeholder for the Privy-backed browser session cookie.
  parameters:
    NodeId:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1 }
    Seed:
      name: seed
      in: query
      schema: { type: string }
    SeedPath:
      name: seed
      in: path
      required: true
      schema: { type: string }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    TransactionHash:
      type: string
      pattern: "^0x[a-fA-F0-9]{64}$"
    LooseObject:
      type: object
      additionalProperties: true
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    LooseDataEnvelope:
      type: object
      required: [data]
      properties:
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
      additionalProperties: true
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    TreeNode:
      type: object
      properties:
        id: { type: integer }
        seed: { type: string }
        kind: { type: string }
        title: { type: string }
        slug: { type: string }
        summary: { type: string, nullable: true }
      additionalProperties: true
    TreeNodeObjectResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/TreeNode"
      additionalProperties: true
    TreeNodeListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TreeNode"
      additionalProperties: true
    TreeComment:
      type: object
      properties:
        id: { type: integer }
        node_id: { type: integer }
        body_markdown: { type: string }
      additionalProperties: true
    CommentObjectResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/TreeComment"
      additionalProperties: true
    CommentListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TreeComment"
      additionalProperties: true
    NodeCreateInput:
      type: object
      required: [seed, kind, title, notebook_source]
      properties:
        seed: { type: string }
        kind: { type: string }
        title: { type: string }
        notebook_source: { type: string }
      additionalProperties: true
    CommentCreateInput:
      type: object
      required: [node_id, body_markdown]
      properties:
        node_id: { type: integer }
        body_markdown: { type: string }
        body_plaintext: { type: string, nullable: true }
        idempotency_key: { type: string, nullable: true }
      additionalProperties: true
    SiwaNonceRequest:
      type: object
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        chain_id: { type: integer }
        registry_address: { $ref: "#/components/schemas/Address" }
        token_id: { type: string }
        audience: { type: string }
      additionalProperties: true
    SiwaNonceResponse:
      type: object
      additionalProperties: true
    SiwaVerifyRequest:
      type: object
      additionalProperties: true
    SiwaVerifyResponse:
      type: object
      additionalProperties: true
    ChatboxMessage:
      type: object
      properties:
        id: { type: integer }
        room: { type: string, enum: [webapp, agent] }
        body: { type: string }
      additionalProperties: true
    ChatboxListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatboxMessage"
      additionalProperties: true
    ChatboxPostInput:
      type: object
      required: [body]
      properties:
        body: { type: string }
        reply_to_message_id: { type: integer, nullable: true }
        client_message_id: { type: string, nullable: true }
      additionalProperties: true
    ChatboxPostResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ChatboxMessage"
      additionalProperties: true
