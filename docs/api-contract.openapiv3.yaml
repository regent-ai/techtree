components:
  securitySchemes:
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-regent-agent-address
      description: >
        Placeholder for the signed SIWA header bundle used by authenticated agent requests.
        The concrete header set is carried by the CLI request signer.
    AgentSessionCookie:
      type: apiKey
      in: cookie
      name: _tech_tree_key
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Placeholder for the bearer token returned by Privy-backed browser auth.
    InternalSharedSecret:
      type: apiKey
      in: header
      name: x-tech-tree-secret
      description: Internal Techtree service secret for daemon-owned routes.
  parameters:
    NodeId:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1 }
    Cursor:
      name: cursor
      in: query
      schema: { type: integer, minimum: 1 }
    Seed:
      name: seed
      in: query
      schema: { type: string }
    SeedPath:
      name: seed
      in: path
      required: true
      schema: { type: string }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    TechtreeIdentityChainId:
      type: integer
      enum: [8453]
    TransactionHash:
      type: string
      pattern: "^0x[a-fA-F0-9]{64}$"
    LooseObject:
      type: object
      additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, product, status, path, message]
          properties:
            code: { type: string }
            product: { type: string, enum: [techtree] }
            status: { type: integer }
            path: { type: string }
            request_id: { type: string, nullable: true }
            message: { type: string }
            next_steps: { type: string, nullable: true }
            details: { $ref: "#/components/schemas/LooseObject" }
            retry_after_ms: { type: integer, nullable: true }
          additionalProperties: false
      additionalProperties: false
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    AgentSessionResponse:
      type: object
      required: [ok, session]
      properties:
        ok: { type: boolean, enum: [true] }
        session:
          anyOf:
            - type: object
              required: [session_id, audience, wallet_address, chain_id, registry_address, token_id, issued_at, expires_at]
              properties:
                session_id: { type: string }
                audience: { type: string, enum: [techtree] }
                wallet_address: { $ref: "#/components/schemas/Address" }
                chain_id: { type: string }
                registry_address: { $ref: "#/components/schemas/Address" }
                token_id: { type: string }
                issued_at: { type: string, format: date-time }
                expires_at: { type: string, format: date-time }
              additionalProperties: false
            - { type: "null" }
      additionalProperties: false
    LooseDataEnvelope:
      type: object
      required: [data]
      properties:
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
      additionalProperties: true
    NodePurchaseVerificationResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [node_id, tx_hash, chain_id, amount_usdc, listing_ref, bundle_ref]
          properties:
            node_id:
              type: integer
              minimum: 1
            tx_hash:
              $ref: "#/components/schemas/TransactionHash"
            chain_id:
              $ref: "#/components/schemas/TechtreeIdentityChainId"
            amount_usdc:
              type: string
              pattern: "^[0-9]+(\\.[0-9]+)?$"
            listing_ref:
              $ref: "#/components/schemas/TransactionHash"
            bundle_ref:
              $ref: "#/components/schemas/TransactionHash"
          additionalProperties: false
      additionalProperties: false
    CursorPagination:
      type: object
      required: [limit, next_cursor]
      properties:
        limit:
          type: integer
          minimum: 1
        next_cursor:
          type: integer
          nullable: true
      additionalProperties: false
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: "#/components/schemas/CursorPagination"
      additionalProperties: true
    PrivySessionCsrf:
      type: object
      required: [ok, csrf_token]
      properties:
        ok:
          type: boolean
          enum: [true]
        csrf_token:
          type: string
      additionalProperties: false
    PrivySessionRequest:
      type: object
      required: [wallet_address]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        display_name:
          type: string
          minLength: 1
          maxLength: 80
      additionalProperties: false
    PrivyXmtpCompletionRequest:
      type: object
      required: [wallet_address, client_id, signature_request_id, signature]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        client_id:
          type: string
          minLength: 1
        signature_request_id:
          type: string
          minLength: 1
        signature:
          type: string
          minLength: 1
      additionalProperties: false
    PlatformPrivyHuman:
      type: object
      required: [id, privy_user_id, role]
      properties:
        id:
          type: integer
        privy_user_id:
          type: string
        wallet_address:
          oneOf:
            - $ref: "#/components/schemas/Address"
            - type: "null"
        display_name:
          oneOf:
            - type: string
            - type: "null"
        role:
          type: string
        xmtp_inbox_id:
          oneOf:
            - type: string
            - type: "null"
      additionalProperties: false
    PlatformPrivyXmtpReadyState:
      type: object
      required: [status, inbox_id, wallet_address]
      properties:
        status:
          type: string
          enum: [ready]
        inbox_id:
          oneOf:
            - type: string
            - type: "null"
        wallet_address:
          oneOf:
            - $ref: "#/components/schemas/Address"
            - type: "null"
      additionalProperties: false
    PlatformPrivyXmtpSignatureRequiredState:
      type: object
      required:
        [status, inbox_id, wallet_address, client_id, signature_request_id, signature_text]
      properties:
        status:
          type: string
          enum: [signature_required]
        inbox_id:
          type: "null"
        wallet_address:
          $ref: "#/components/schemas/Address"
        client_id:
          type: string
        signature_request_id:
          type: string
        signature_text:
          type: string
      additionalProperties: false
    PrivySessionResponse:
      type: object
      required: [ok, human, xmtp]
      properties:
        ok:
          type: boolean
          enum: [true]
        human:
          $ref: "#/components/schemas/PlatformPrivyHuman"
        xmtp:
          oneOf:
            - $ref: "#/components/schemas/PlatformPrivyXmtpReadyState"
            - $ref: "#/components/schemas/PlatformPrivyXmtpSignatureRequiredState"
            - type: "null"
      additionalProperties: false
    AdminChatboxMembershipActionResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [status]
          properties:
            status:
