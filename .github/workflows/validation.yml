name: validation

on:
  push:
  pull_request:

jobs:
  phoenix:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech_tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCAL_DATABASE_URL: ecto://postgres:postgres@localhost/tech_tree_test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15.8"
          otp-version: "26.2.5"

      - name: Install Phoenix deps
        run: mix deps.get

      - name: Run Phoenix validation
        run: |
          mix precommit
          git diff --exit-code

  browser:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech_tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCAL_DATABASE_URL: ecto://postgres:postgres@localhost/tech_tree_test
      PLAYWRIGHT_VERSION: 1.58.2

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15.8"
          otp-version: "26.2.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phoenix deps
        run: mix deps.get

      - name: Install asset deps
        working-directory: assets
        run: npm ci

      - name: Install browser CLI
        run: npm install -g agent-browser

      - name: Prepare app
        run: |
          mix ecto.setup
          mix assets.setup
          mix assets.build

      - name: Start Phoenix server
        run: |
          mix phx.server > /tmp/tech_tree_browser.log 2>&1 &
          echo $! > /tmp/tech_tree_browser.pid

      - name: Run homepage browser lanes
        run: |
          bash qa/phase-c-smoke.sh
          bash qa/phase-d-browser-e2e.sh

      - name: Stop Phoenix server
        if: always()
        run: |
          if [ -f /tmp/tech_tree_browser.pid ]; then
            kill "$(cat /tmp/tech_tree_browser.pid)" || true
          fi

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts
          path: |
            qa/artifacts
            /tmp/tech_tree_browser.log

  services:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install services deps
        working-directory: services
        run: bun install --frozen-lockfile

      - name: Run services validation
        working-directory: services
        run: |
          bun run build
          bun run typecheck

  regents-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: regent-ai/regents-cli
          path: regents-cli-repo

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"

      - name: Install regents-cli deps
        working-directory: regents-cli-repo
        run: pnpm install --frozen-lockfile

      - name: Run regents-cli validation and packaged install smoke
        working-directory: regents-cli-repo
        run: |
          pnpm build
          pnpm typecheck
          pnpm test
          pnpm test:pack-smoke

  contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: regent-ai/contracts
          path: contracts-repo

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        working-directory: contracts-repo/techtree
        run: forge test --offline
