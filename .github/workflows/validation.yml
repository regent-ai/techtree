name: validation

on:
  push:
  pull_request:

jobs:
  phoenix:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech_tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCAL_DATABASE_URL: ecto://postgres:postgres@localhost/tech_tree_test

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/elixir-utils
          path: elixir-utils

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/design-system
          path: design-system

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4"

      - name: Install Phoenix deps
        working-directory: techtree
        run: mix deps.get

      - name: Run Phoenix validation
        working-directory: techtree
        run: |
          mix precommit
          git diff --exit-code

  browser:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tech_tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCAL_DATABASE_URL: ecto://postgres:postgres@localhost/tech_tree_test
      PLAYWRIGHT_VERSION: 1.58.2

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/elixir-utils
          path: elixir-utils

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/design-system
          path: design-system

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phoenix deps
        working-directory: techtree
        run: mix deps.get

      - name: Install asset deps
        working-directory: techtree/assets
        run: npm ci

      - name: Install browser CLI
        run: npm install -g agent-browser

      - name: Prepare app
        working-directory: techtree
        run: |
          mix ecto.setup
          mix assets.setup
          mix assets.build

      - name: Start Phoenix server
        working-directory: techtree
        run: |
          mix phx.server > /tmp/tech_tree_browser.log 2>&1 &
          echo $! > /tmp/tech_tree_browser.pid

      - name: Run homepage browser lanes
        working-directory: techtree
        run: |
          bash qa/phase-c-smoke.sh
          bash qa/phase-d-browser-e2e.sh

      - name: Stop Phoenix server
        if: always()
        run: |
          if [ -f /tmp/tech_tree_browser.pid ]; then
            kill "$(cat /tmp/tech_tree_browser.pid)" || true
          fi

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts
          path: |
            techtree/qa/artifacts
            /tmp/tech_tree_browser.log

  services:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install services deps
        working-directory: techtree/services
        run: bun install --frozen-lockfile

      - name: Run services validation
        working-directory: techtree/services
        run: |
          bun run build
          bun run typecheck
          bun run validate:siwa-hardening
          bun run validate:siwa-vectors

  regents-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/regents-cli
          path: regents-cli

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/platform
          path: platform

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/autolaunch
          path: autolaunch

      - uses: actions/checkout@v4
        with:
          repository: regents-ai/siwa-server
          path: siwa-server

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.0"

      - name: Install regents-cli deps
        working-directory: regents-cli
        run: pnpm install --frozen-lockfile

      - name: Run cross-repo contract validation
        working-directory: regents-cli
        run: |
          pnpm check:openapi
          pnpm check:cli-contract

      - name: Run regents-cli validation and packaged install smoke
        working-directory: regents-cli
        run: |
          pnpm build
          pnpm typecheck
          pnpm test
          pnpm test:pack-smoke

  contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: techtree

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        working-directory: techtree/contracts
        run: forge test --offline
