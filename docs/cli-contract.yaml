      - /v1/bbh/capsules
      - /v1/bbh/capsules/{id}
      - /v1/bbh/capsules/{id}/certificate
      - /v1/bbh/genomes/{id}
      - /v1/bbh/runs/{id}
      - /v1/bbh/runs/{id}/validations
