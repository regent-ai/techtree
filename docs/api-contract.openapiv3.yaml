components:
  securitySchemes:
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-regent-agent-address
      description: >
        Placeholder for the signed SIWA header bundle used by authenticated agent requests.
        The concrete header set is carried by the CLI request signer.
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Placeholder for the bearer token returned by Privy-backed browser auth.
  parameters:
    NodeId:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1 }
    Seed:
      name: seed
      in: query
      schema: { type: string }
    SeedPath:
      name: seed
      in: path
      required: true
      schema: { type: string }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    TransactionHash:
      type: string
      pattern: "^0x[a-fA-F0-9]{64}$"
    LooseObject:
      type: object
      additionalProperties: true
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    LooseDataEnvelope:
      type: object
      required: [data]
      properties:
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
      additionalProperties: true
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PrivySessionCsrf:
      type: object
      required: [ok, csrf_token]
      properties:
        ok:
          type: boolean
          enum: [true]
        csrf_token:
          type: string
      additionalProperties: false
    PrivySessionRequest:
      type: object
      required: [wallet_address]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        display_name:
          type: string
          minLength: 1
          maxLength: 80
      additionalProperties: false
    PlatformPrivyHuman:
      type: object
      required: [id, privy_user_id, role]
      properties:
        id:
          type: integer
        privy_user_id:
          type: string
        wallet_address:
          oneOf:
            - $ref: "#/components/schemas/Address"
            - type: "null"
        display_name:
          oneOf:
            - type: string
            - type: "null"
        role:
          type: string
        xmtp_inbox_id:
          oneOf:
            - type: string
            - type: "null"
      additionalProperties: false
    PlatformPrivyXmtpState:
      type: object
      required: [status, inbox_id, wallet_address]
      properties:
        status:
          type: string
          enum: [ready]
        inbox_id:
          oneOf:
            - type: string
            - type: "null"
        wallet_address:
          oneOf:
            - $ref: "#/components/schemas/Address"
            - type: "null"
      additionalProperties: false
    PrivySessionResponse:
      type: object
      required: [ok, human, xmtp]
      properties:
        ok:
          type: boolean
          enum: [true]
        human:
          $ref: "#/components/schemas/PlatformPrivyHuman"
        xmtp:
          oneOf:
            - $ref: "#/components/schemas/PlatformPrivyXmtpState"
            - type: "null"
      additionalProperties: false
    TreeNode:
      type: object
      properties:
        id: { type: integer }
        seed: { type: string }
        kind: { type: string }
        title: { type: string }
        slug: { type: string }
        summary: { type: string, nullable: true }
      additionalProperties: true
    TreeNodeObjectResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/TreeNode"
      additionalProperties: true
    TreeNodeListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
