  /auth/orcid/start:
    get:
      operationId: startOrcidReviewerLink
      tags: [auth]
      parameters:
        - name: request_id
          in: query
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "302":
          description: Redirects to the ORCID callback with a signed link token
  /auth/orcid/callback:
    get:
      operationId: completeOrcidReviewerLink
      tags: [auth]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: ORCID link completed
          content:
            text/html:
              schema: { type: string }
        "422":
          description: ORCID link could not be completed
          content:
            text/html:
              schema: { type: string }

  /api/auth/agent/session:
    get:
      operationId: getTechtreeAgentSession
      tags: [auth]
      security: [{ AgentSessionCookie: [] }]
      responses:
        "200":
          description: Current local techtree agent session
          content:
