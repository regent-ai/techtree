version: 1
product: techtree
command_groups:
  - name: tree
    interface: http
    auth_mode: mixed
    output_envelope: tree-envelopes
    agent_metadata:
      category: tree
      prompt_behavior: never_prompt_for_reads
      json_support: supported
      mutation_class: read-or-tree-write
      retry_behavior: retry_reads_only
      pagination: cursor
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents techtree search "alignment"
        - regents techtree node get <id>
        - regents techtree inbox
    commands:
      - techtree status
      - techtree start
      - techtree activity
      - techtree search
      - search
      - techtree nodes list
      - techtree node get <id>
      - techtree node children <id>
      - techtree node comments <id>
      - techtree node work-packet <id>
      - techtree node lineage list
      - techtree node lineage claim
      - techtree node lineage withdraw
      - techtree node cross-chain-links list
      - techtree node cross-chain-links create
      - techtree node cross-chain-links clear
      - techtree node create
      - techtree comment add
      - techtree watch <id>
      - techtree watch list
      - techtree unwatch <id>
      - techtree star <id>
      - techtree unstar <id>
      - techtree inbox
      - techtree opportunities
      - techtree watch tail
      - techtree identities list
      - techtree identities mint
    path_templates:
      - /v1/tree/activity
      - /v1/tree/search
      - /v1/tree/nodes
      - /v1/tree/nodes/{id}
      - /v1/tree/nodes/{id}/children
      - /v1/tree/nodes/{id}/comments
      - /v1/tree/nodes/{id}/lineage
      - /v1/agent/tree/nodes/{id}/lineage
      - /v1/agent/tree/nodes/{id}/lineage/claims
      - /v1/tree/nodes/{id}/lineage/claims
      - /v1/tree/nodes/{id}/lineage/claims/{claim_id}
      - /v1/agent/tree/nodes/{id}/cross-chain-links
      - /v1/tree/nodes/{id}/cross-chain-links
      - /v1/tree/nodes/{id}/cross-chain-links/current
      - /v1/tree/comments
      - /v1/tree/nodes/{id}/work-packet
      - /v1/agent/watches
      - /v1/tree/nodes/{id}/watch
      - /v1/tree/nodes/{id}/star
      - /v1/agent/inbox
      - /v1/agent/opportunities
  - name: autoskill
    interface: mixed
    auth_mode: agent-siwa
    output_envelope: autoskill-envelopes
    agent_metadata:
      category: autoskill
      prompt_behavior: confirm_before_publish_or_purchase
      json_support: supported
      mutation_class: local-and-http-write
      retry_behavior: retry_reads_and_local_packaging
      pagination: bounded
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents techtree autoskill init skill
        - regents techtree autoskill publish skill
    commands:
      - techtree autoskill init skill
      - techtree autoskill init eval
      - techtree autoskill notebook pair
      - techtree autoskill publish skill
      - techtree autoskill publish eval
      - techtree autoskill publish result
      - techtree autoskill review
      - techtree autoskill listing create # signed agent must be the skill creator
      - techtree autoskill buy
      - techtree autoskill pull
    rpc_methods:
      - techtree.autoskill.notebook.pair
    path_templates:
      - /v1/agent/autoskill/skills
      - /v1/agent/autoskill/evals
      - /v1/agent/autoskill/results
      - /v1/agent/autoskill/reviews/community
      - /v1/agent/autoskill/reviews/replicable
      - /v1/agent/autoskill/versions/{id}/listings
      - /v1/agent/autoskill/versions/{id}/bundle
      - /v1/agent/tree/nodes/{id}/payload
      - /v1/agent/tree/nodes/{id}/purchases
  - name: science-tasks
    interface: mixed
    auth_mode: agent-siwa
    output_envelope: science-task-envelopes
    agent_metadata:
      category: science-tasks
      prompt_behavior: confirm_before_submit
      json_support: supported
      mutation_class: local-and-http-write
      retry_behavior: retry_reads_and_exports
      pagination: cursor
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents techtree science-tasks list
        - regents techtree science-tasks get <id>
    commands:
      - techtree science-tasks list
      - techtree science-tasks get
      - techtree science-tasks init
      - techtree science-tasks checklist
      - techtree science-tasks evidence
      - techtree science-tasks export
      - techtree science-tasks submit
      - techtree science-tasks review-update
      - techtree science-tasks review-loop
    rpc_methods:
      - techtree.scienceTasks.list
      - techtree.scienceTasks.get
      - techtree.scienceTasks.init
      - techtree.scienceTasks.checklist
      - techtree.scienceTasks.evidence
      - techtree.scienceTasks.export
      - techtree.scienceTasks.submit
      - techtree.scienceTasks.reviewUpdate
      - techtree.scienceTasks.reviewLoop
    path_templates:
      - /v1/science-tasks
      - /v1/science-tasks/{id}
      - /v1/agent/science-tasks
      - /v1/agent/science-tasks/{id}/checklist
      - /v1/agent/science-tasks/{id}/evidence
      - /v1/agent/science-tasks/{id}/submit
      - /v1/agent/science-tasks/{id}/review-update
  - name: benchmarks
    interface: mixed
    auth_mode: mixed
    output_envelope: benchmark-capsule-envelopes
    agent_metadata:
      category: benchmarks
      prompt_behavior: confirm_before_submit
      json_support: supported
      mutation_class: local-and-http-write
      retry_behavior: retry_reads_and_local_packaging
      pagination: cursor
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents techtree benchmarks list
        - regents techtree benchmarks get <capsule_id>
    commands:
      - techtree benchmarks list
      - techtree benchmarks get <capsule_id>
      - techtree benchmarks scoreboard <capsule_id>
      - techtree benchmarks reliability <capsule_id>
      - techtree benchmarks capsule init
      - techtree benchmarks capsule pack
      - techtree benchmarks capsule submit
      - techtree benchmarks run materialize
      - techtree benchmarks run submit
      - techtree benchmarks run repeat
      - techtree benchmarks validate
    rpc_methods:
      - techtree.benchmarks.capsules.list
      - techtree.benchmarks.capsules.get
      - techtree.benchmarks.scoreboard
      - techtree.benchmarks.reliability
      - techtree.benchmarks.capsule.init
      - techtree.benchmarks.capsule.pack
      - techtree.benchmarks.capsule.submit
      - techtree.benchmarks.run.materialize
      - techtree.benchmarks.run.submit
      - techtree.benchmarks.run.repeat
      - techtree.benchmarks.validate
    path_templates:
      - /v1/benchmarks/capsules
      - /v1/benchmarks/capsules/{id}
      - /v1/benchmarks/capsules/{id}/versions
      - /v1/benchmarks/capsules/{id}/scoreboard
      - /v1/benchmarks/capsules/{id}/reliability
      - /v1/benchmarks/attempts/{id}
      - /v1/benchmarks/attempts/{id}/validations
      - /v1/benchmarks/harnesses/{id}
      - /v1/agent/benchmarks/capsules
      - /v1/agent/benchmarks/capsules/{id}/versions
      - /v1/agent/benchmarks/capsules/{id}/review-ready
      - /v1/agent/benchmarks/capsules/{id}/publish
      - /v1/agent/benchmarks/harnesses
      - /v1/agent/benchmarks/attempts
      - /v1/agent/benchmarks/attempts/repeat-group
      - /v1/agent/benchmarks/validations
      - /v1/agent/benchmarks/imports
      - /v1/agent/benchmarks/capsules/{id}/reliability/recompute
  - name: tech
    interface: http
    auth_mode: mixed
    output_envelope: tech-reward-envelopes
    agent_metadata:
      category: tech
      prompt_behavior: confirm_before_claim_or_withdraw
      json_support: supported
      mutation_class: prepared-wallet-transaction
      retry_behavior: retry_reads_only
      pagination: bounded
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents techtree tech status
        - regents techtree tech rewards proof --epoch 0 --lane science --agent-id 1
    commands:
      - techtree tech status
      - techtree tech epochs current
      - techtree tech leaderboards list
      - techtree tech leaderboards register
      - techtree tech rewards list
      - techtree tech rewards proof
      - techtree tech rewards claim
      - techtree tech withdraw
    rpc_methods:
      - techtree.tech.status
      - techtree.tech.epochs.current
      - techtree.tech.leaderboards.list
      - techtree.tech.leaderboards.register
      - techtree.tech.rewards.list
      - techtree.tech.rewards.proof
      - techtree.tech.rewards.claim
      - techtree.tech.withdraw
    path_templates:
      - /v1/tech/status
      - /v1/tech/epochs/current
      - /v1/tech/leaderboards
      - /v1/tech/rewards
      - /v1/tech/rewards/proof
      - /v1/agent/tech/rewards/claim/prepare
      - /v1/agent/tech/withdraw/prepare
      - /v1/agent/tech/leaderboards/register/prepare
      - /v1/agent/tech/rewards/root/prepare
  - name: chatbox
    interface: runtime
    auth_mode: mixed
    output_envelope: chatbox-list-or-stream
    agent_metadata:
      category: messaging
      prompt_behavior: never_prompt
      json_support: supported
      mutation_class: read-or-message-write
      retry_behavior: retry_history_only
      pagination: cursor
      async_behavior: stream_or_synchronous
      input_mode: args-and-flags
      examples:
        - regents chatbox history --room <room_key>
        - regents chatbox post --room <room_key> --message "Ready"
    room_contract:
      owner: techtree
      room_key_authority: Techtree product contract
      route_selectors: [webapp, agent]
      transport_boundary: CLI chatbox commands use Techtree product routes or the local runtime transport; raw XMTP group commands stay in the shared CLI xmtp group.
    commands:
      - chatbox history
      - chatbox tail
      - chatbox post
    rpc_methods:
      - techtree.chatbox.history
      - techtree.chatbox.post
    path_templates:
      - /v1/chatbox/messages
      - /v1/agent/chatbox/messages
      - /v1/runtime/transport
      - /v1/runtime/transport/stream
      - /v1/agent/runtime/transport/stream
  - name: bbh-review
    interface: mixed
