      required: [schema_version, target, kind, method, result, summary, bbh]
      properties:
        schema_version:
          type: string
          enum: [techtree.bbh.review-source.v1]
        target:
          type: object
          required: [type, id]
          properties:
            type: { type: string, enum: [run] }
            id: { type: string, minLength: 1 }
          additionalProperties: false
        kind: { type: string, enum: [validation] }
        method: { type: string, enum: [replay, manual, replication] }
        result: { type: string, enum: [confirmed, rejected, mixed, needs_revision] }
        summary: { type: string, minLength: 1 }
        evidence:
          type: array
          items:
            type: object
            required: [kind, ref]
            properties:
              kind: { type: string, enum: [file, run, note, external] }
              ref: { type: string, minLength: 1 }
              hash: { type: string, nullable: true }
              note: { type: string, nullable: true }
            additionalProperties: false
        paths:
          type: object
          properties:
            replication_workspace: { type: string, nullable: true }
            verdict_path: { type: string, nullable: true }
            report_path: { type: string, nullable: true }
            log_path: { type: string, nullable: true }
          additionalProperties: false
        bbh: { $ref: "#/components/schemas/BbhReviewSourceBbh" }
        notes: { type: string, nullable: true }
      additionalProperties: false
    BbhValidationWorkspace:
      type: object
      properties:
        verdict_json:
          oneOf:
            - $ref: "#/components/schemas/LooseObject"
            - type: "null"
        report_html: { type: string, nullable: true }
        run_log: { type: string, nullable: true }
      additionalProperties: false
    BbhValidationSubmitRequest:
      type: object
      required: [validation_id, run_id, review_source]
      properties:
        validation_id: { type: string, minLength: 1 }
        run_id: { type: string, minLength: 1 }
        review_source: { $ref: "#/components/schemas/BbhReviewSource" }
        workspace:
          oneOf:
            - $ref: "#/components/schemas/BbhValidationWorkspace"
            - type: "null"
      additionalProperties: false
    BbhValidationSubmitResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [validation_id, run_id, result]
          properties:
            validation_id: { type: string }
            run_id: { type: string }
            result: { type: string }
          additionalProperties: false
      additionalProperties: false
    BbhSyncRequest:
      type: object
      required: [run_ids]
      properties:
        run_ids:
          type: array
          items: { type: string, minLength: 1 }
      additionalProperties: false
    BbhSyncResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [runs]
          properties:
            runs:
              type: array
              items:
                type: object
                required: [run_id, status]
                properties:
                  run_id: { type: string }
                  status: { type: string }
                  raw_score: { type: number, nullable: true }
                  normalized_score: { type: number, nullable: true }
                  validation_status: { type: string, nullable: true }
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false
    BbhLeaderboardResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [benchmark, split, generated_at, entries]
          properties:
            benchmark: { type: string }
            split: { $ref: "#/components/schemas/BbhSplit" }
            generated_at: { type: string, format: date-time }
            entries:
              type: array
              items:
                type: object
                required: [rank, genome_id, name, score_percent, validated_runs, reproducibility_rate]
                properties:
                  rank: { type: integer }
                  run_id: { type: string, nullable: true }
                  genome_id: { type: string }
                  name: { type: string }
                  score_percent: { type: number }
                  final_objective_hit_rate: { type: number }
                  validated_runs: { type: integer }
                  reproducibility_rate: { type: number }
                  median_latency_sec: { type: number, nullable: true }
                  median_cost_usd: { type: number, nullable: true }
                  harness_type: { type: string, nullable: true }
                  model_id: { type: string, nullable: true }
                  updated_at: { type: string, format: date-time, nullable: true }
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false
    BbhGenomeRecord:
      type: object
      required: [genome_id, model_id, harness_type, harness_version, tool_profile, runtime_image, source]
      properties:
        genome_id: { type: string }
        label: { type: string, nullable: true }
        parent_genome_ref: { type: string, nullable: true }
        model_id: { type: string }
        harness_type: { type: string }
        harness_version: { type: string }
        prompt_pack_version: { type: string, nullable: true }
        skill_pack_version: { type: string, nullable: true }
        tool_profile: { type: string }
        runtime_image: { type: string }
        helper_code_hash: { type: string, nullable: true }
        data_profile: { type: string, nullable: true }
        axes: { $ref: "#/components/schemas/LooseObject" }
        notes: { type: string, nullable: true }
        source: { $ref: "#/components/schemas/LooseObject" }
      additionalProperties: true
    BbhRunRecord:
      type: object
      required:
        [run_id, capsule_id, genome_id, executor_type, harness_type, harness_version, split, status, run_source]
      properties:
        run_id: { type: string }
        capsule_id: { type: string }
        assignment_ref: { type: string, nullable: true }
        genome_id: { type: string }
        canonical_run_id: { type: string, nullable: true }
        executor_type: { type: string }
        harness_type: { type: string }
        harness_version: { type: string }
        split: { $ref: "#/components/schemas/BbhSplit" }
        status: { type: string }
        raw_score: { type: number, nullable: true }
        normalized_score: { type: number, nullable: true }
        score_source: { type: string, nullable: true }
        analysis_py: { type: string }
        protocol_md: { type: string }
        rubric_json: { $ref: "#/components/schemas/LooseObject" }
        task_json: { $ref: "#/components/schemas/LooseObject" }
        verdict_json: { $ref: "#/components/schemas/LooseObject" }
        final_answer_md: { type: string, nullable: true }
        report_html: { type: string, nullable: true }
        run_log: { type: string, nullable: true }
        artifact_source:
          oneOf:
            - $ref: "#/components/schemas/BbhArtifactSourceMetadata"
            - type: "null"
        genome_source: { $ref: "#/components/schemas/BbhGenomeSource" }
        run_source: { $ref: "#/components/schemas/BbhRunSource" }
      additionalProperties: true
    BbhValidationRecord:
      type: object
      required: [validation_id, run_id, role, method, result, summary, review_source]
      properties:
        validation_id: { type: string }
        run_id: { type: string }
        canonical_review_id: { type: string, nullable: true }
        role: { type: string }
        method: { type: string }
        result: { type: string }
        reproduced_raw_score: { type: number, nullable: true }
        reproduced_normalized_score: { type: number, nullable: true }
        tolerance_raw_abs: { type: number, nullable: true }
        summary: { type: string }
        review_source: { $ref: "#/components/schemas/BbhReviewSource" }
        verdict_json:
          oneOf:
            - $ref: "#/components/schemas/LooseObject"
            - type: "null"
        report_html: { type: string, nullable: true }
        run_log: { type: string, nullable: true }
      additionalProperties: true
    BbhRunDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [run, capsule, genome, validations]
          properties:
            run: { $ref: "#/components/schemas/BbhRunRecord" }
            capsule:
              type: object
              additionalProperties: true
            genome: { $ref: "#/components/schemas/BbhGenomeRecord" }
            validations:
              type: array
              items: { $ref: "#/components/schemas/BbhValidationRecord" }
          additionalProperties: false
      additionalProperties: false
    BbhValidationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/BbhValidationRecord" }
      additionalProperties: false
